                on_right: "toggle_label"
            label_shadow:
                enabled: true
                color: "black"
                radius: 3
                offset: [1, 1]
    media:
        type: "yasb.media.MediaWidget"
        options:
            label: "{artist}"
            label_alt: "{title}"
            max_field_size:
