            menu:
                blur: true
                round_corners: true
                round_corners_type: "normal"
                border_color: "system"
                alignment: "center"
                direction: "down"
                offset_top: 6
                offset_left: 0
            callbacks:
                on_left: "toggle_menu"
                on_middle: "do_nothing"
                on_right: "toggle_label"

