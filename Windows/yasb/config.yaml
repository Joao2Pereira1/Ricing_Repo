            timezones: []
            calendar:
                round_corners: true
                round_corners_type: "small"
                border_color: "System"
                alignment: "center"
                offset_top: 0
    volume:
        type: "yasb.volume.VolumeWidget"
        options:
            label: "<span>{icon}</span> {level}"
            label_alt: "{volume}"
            label_shadow:
                enabled: true
                color: "black"
                radius: 3
                offset: [1, 1]
            volume_icons:
